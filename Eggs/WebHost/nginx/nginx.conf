worker_processes auto;
pid /home/container/tmp/nginx.pid;
daemon off;

events {
	worker_connections 1024;
	multi_accept on;
}

http {
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;

	# Sécurité : On cache la version de Nginx
	server_tokens off;

	log_format FurLogs '🐾 [FurLogs] | Client: $remote_addr | Req: "$request" | Statut: $status | UserAgent: "$http_user_agent"';

	access_log /home/container/logs/access.log FurLogs;
	access_log /dev/stdout FurLogs;
	error_log /home/container/logs/error.log warn;
	error_log /dev/stdout warn;

	include /home/container/nginx/mime.types;
	default_type application/octet-stream;
	
	proxy_temp_path /home/container/tmp;
	client_body_temp_path /home/container/tmp;
	fastcgi_temp_path /home/container/tmp;
	uwsgi_temp_path /home/container/tmp;
	scgi_temp_path /home/container/tmp;

	# Sécurité : Protocoles SSL modernes uniquement
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 10m;

	gzip on;
	gzip_proxied any;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
	gzip_disable "msie6";

	include /home/container/nginx/conf.d/*.conf;
}