;;;;;;;;;;;;;;;;;;;;;;;
; Configuration du FPM ;
;;;;;;;;;;;;;;;;;;;;;;;

; Tous les chemins relatifs dans ce fichier de configuration sont relatifs au préfixe
; d'installation de PHP (/usr). Ce préfixe peut être modifié dynamiquement en utilisant
; l'argument '-p' depuis la ligne de commande.

;;;;;;;;;;;;;;;;;;;;
; Options Globales ;
;;;;;;;;;;;;;;;;;;;;

[global]
; Fichier PID
; Note : le préfixe par défaut est /var
; Valeur par défaut : aucune
pid = /home/container/tmp/php-fpm.pid

; Fichier de log des erreurs
; S'il est défini sur "syslog", le log est envoyé à syslogd au lieu d'être écrit
; dans un fichier local.
; Note : le préfixe par défaut est /var
; Valeur par défaut : log/php-fpm.log
error_log = /home/container/php-fpm.log

; syslog_facility est utilisé pour spécifier quel type de programme enregistre le
; message. Cela permet à syslogd de traiter différemment les messages provenant
; de diverses installations.
; Voir syslog(3) pour les valeurs possibles (ex: daemon)
; Valeur par défaut : daemon
;syslog.facility = daemon

; syslog_ident est ajouté au début de chaque message. Si vous avez plusieurs instances
; FPM tournant sur le même serveur, vous pouvez changer la valeur par défaut.
; Valeur par défaut : php-fpm
;syslog.ident = php-fpm

; Niveau de log
; Valeurs possibles : alert, error, warning, notice, debug
; Valeur par défaut : notice
;log_level = notice

; Si ce nombre de processus enfants s'arrête avec SIGSEGV ou SIGBUS dans l'intervalle
; de temps défini par emergency_restart_interval, alors FPM redémarrera.
; Une valeur de '0' signifie 'Désactivé'.
; Valeur par défaut : 0
;emergency_restart_threshold = 0

; Intervalle de temps utilisé pour déterminer quand un redémarrage d'urgence
; sera initié. Utile pour contourner les corruptions accidentelles de la mémoire
; partagée d'un accélérateur.
; Unités disponibles : s(econdes), m(inutes), h(eures), ou d(igits/jours)
; Valeur par défaut : 0
;emergency_restart_interval = 0

; Limite de temps pour que les processus enfants attendent une réaction aux signaux du maître.
; Valeur par défaut : 0
;process_control_timeout = 0

; Le nombre maximum de processus que FPM pourra créer (fork). Conçu pour contrôler
; le nombre global de processus lors de l'utilisation de plusieurs pools dynamiques.
; À utiliser avec précaution. '0' indique aucune limite.
; Valeur par défaut : 0
; process.max = 128

; Spécifie la priorité nice(2) à appliquer au processus maître (si défini).
; La valeur varie de -19 (priorité la plus haute) à 20 (priorité la plus basse).
; Note : Ne fonctionne que si le maître FPM est lancé en root.
; Valeur par défaut : non défini
; process.priority = -19

; Envoie FPM en arrière-plan (daemon). Réglez sur 'no' pour garder FPM au premier plan
; pour le débogage.
; Valeur par défaut : yes
;daemonize = yes

; Définit la limite (rlimit) du nombre de descripteurs de fichiers ouverts pour le maître.
; Valeur par défaut : valeur système
;rlimit_files = 1024

; Définit la limite de taille maximale du fichier core pour le processus maître.
; Valeurs : 'unlimited' ou un entier >= 0.
;rlimit_core = 0

; Spécifie le mécanisme d'événement que FPM utilisera (epoll est recommandé sur Linux).
; Valeur par défaut : non défini (détection auto)
;events.mechanism = epoll

; Lorsque FPM est compilé avec l'intégration systemd, spécifie l'intervalle (en secondes)
; entre les notifications de rapport d'état à systemd. 0 pour désactiver.
; Valeur par défaut : 10
;systemd_interval = 10

;;;;;;;;;;;;;;;;;;;;;;;;
; Définitions des Pools ;
;;;;;;;;;;;;;;;;;;;;;;;;

; Plusieurs pools de processus enfants peuvent être démarrés avec différents ports
; d'écoute et différentes options de gestion. Le nom du pool sera utilisé
; dans les logs et les statistiques. Il n'y a pas de limite au nombre de pools.

; Inclure un ou plusieurs fichiers. Cette directive peut être utilisée partout.
; Les chemins relatifs seront préfixés par :
;  - le préfixe global s'il est défini (argument -p)
;  - /usr sinon
include=/home/container/php-fpm/fpm.pool.d/*.conf