[PHP]

;;;;;;;;;;;;;;;;;;;;;;
; À propos de php.ini ;
;;;;;;;;;;;;;;;;;;;;;;
; Le fichier d'initialisation de PHP, généralement appelé php.ini, est responsable de
; la configuration de nombreux aspects du comportement de PHP.

; PHP tente de trouver et de charger cette configuration à partir de plusieurs emplacements.
; Voici un résumé de l'ordre de recherche :
; 1. Emplacement spécifique au module SAPI.
; 2. La variable d'environnement PHPRC. (Depuis PHP 5.2.0)
; 3. Un certain nombre de clés de registre prédéfinies sur Windows (Depuis PHP 5.2.0)
; 4. Répertoire de travail actuel (sauf CLI)
; 5. Le répertoire du serveur web (pour les modules SAPI), ou le répertoire de PHP
;    (autrement sous Windows)
; 6. Le répertoire défini par l'option de compilation --with-config-file-path, ou le
;    répertoire Windows (C:\windows ou C:\winnt)
; Voir la documentation PHP pour des informations plus spécifiques.
; http://php.net/configuration.file

; La syntaxe du fichier est extrêmement simple. Les espaces blancs et les lignes
; commençant par un point-virgule sont ignorés silencieusement (comme vous l'avez deviné).
; Les en-têtes de section (ex: [Foo]) sont également ignorés, même s'ils
; pourraient signifier quelque chose à l'avenir.

; Les directives suivant l'en-tête de section [PATH=/www/monsite] s'appliquent uniquement
; aux fichiers PHP dans le répertoire /www/monsite. Les directives
; suivant l'en-tête de section [HOST=www.example.com] s'appliquent uniquement aux
; fichiers PHP servis depuis www.example.com. Les directives définies dans ces
; sections spéciales ne peuvent pas être surchargées par des fichiers INI utilisateur ou
; au moment de l'exécution. Actuellement, les sections [PATH=] et [HOST=] ne fonctionnent que sous
; CGI/FastCGI.
; http://php.net/ini.sections

; Les directives sont spécifiées selon la syntaxe suivante :
; directive = valeur
; Les noms de directives sont *sensibles à la casse* - foo=bar est différent de FOO=bar.
; Les directives sont des variables utilisées pour configurer PHP ou ses extensions.
; Il n'y a pas de validation de nom. Si PHP ne trouve pas une directive attendue
; parce qu'elle n'est pas définie ou mal orthographiée, une valeur par défaut sera utilisée.

; La valeur peut être une chaîne, un nombre, une constante PHP (ex: E_ALL ou M_PI), l'une
; des constantes INI (On, Off, True, False, Yes, No et None) ou une expression
; (ex: E_ALL & ~E_NOTICE), une chaîne entre guillemets ("bar"), ou une référence à une
; variable ou directive précédemment définie (ex: ${foo})

; Les expressions dans le fichier INI sont limitées aux opérateurs binaires et parenthèses :
; |  OU binaire
; ^  XOR binaire
; &  ET binaire
; ~  NON binaire
; !  NON booléen

; Les indicateurs booléens peuvent être activés via les valeurs 1, On, True ou Yes.
; Ils peuvent être désactivés via les valeurs 0, Off, False ou No.

; Une chaîne vide peut être désignée en n'écrivant rien après le signe égal,
; ou en utilisant le mot-clé None :

;  foo =         ; définit foo comme une chaîne vide
;  foo = None    ; définit foo comme une chaîne vide
;  foo = "None"  ; définit foo comme la chaîne 'None'

; Si vous utilisez des constantes dans vos valeurs, et que ces constantes appartiennent à une
; extension chargée dynamiquement (extension PHP ou Zend),
; vous ne pouvez les utiliser qu'*après* la ligne qui charge l'extension.

;;;;;;;;;;;;;;;;;;;;;;;;;
; À propos de ce fichier ;
;;;;;;;;;;;;;;;;;;;;;;;;;
; PHP est livré avec deux fichiers INI. L'un est recommandé pour les environnements
; de production et l'autre pour les environnements de développement.

; php.ini-production contient des réglages axés sur la sécurité, la performance et
; les meilleures pratiques. Attention, ces réglages peuvent casser la
; compatibilité avec des applications anciennes ou moins soucieuses de la sécurité. Nous
; recommandons d'utiliser l'INI production dans les environnements de production et de test.

; php.ini-development est très similaire à la variante production, sauf qu'il est
; beaucoup plus verbeux concernant les erreurs. Nous recommandons de l'utiliser
; uniquement en développement, car les erreurs affichées aux utilisateurs finaux
; peuvent accidentellement divulguer des informations sécurisées.

; Ceci est le fichier INI php.ini-production.

;;;;;;;;;;;;;;;;;;;;;
; Référence Rapide  ;
;;;;;;;;;;;;;;;;;;;;;
; Voici tous les réglages qui diffèrent dans les versions production ou développement
; par rapport au comportement par défaut de PHP. Veuillez consulter les réglages réels
; plus loin dans le document pour plus de détails sur ces recommandations.

; (Suivent les valeurs display_errors, error_reporting, etc., avec leurs réglages par défaut/dev/prod)

;;;;;;;;;;;;;;;;;;;;;;
; Options php.ini    ;
;;;;;;;;;;;;;;;;;;;;;;
; Nom des fichiers php.ini définis par l'utilisateur (.htaccess). Par défaut : ".user.ini"
;user_ini.filename = ".user.ini"

; Pour désactiver cette fonctionnalité, laissez cette option vide.
;user_ini.filename =

; TTL (durée de vie) pour les fichiers php.ini utilisateur en secondes. Par défaut : 300s (5 min)
;user_ini.cache_ttl = 300

;;;;;;;;;;;;;;;;;;;;;;
; Options de Langage ;
;;;;;;;;;;;;;;;;;;;;;;

; Active le moteur de script PHP sous Apache.
; http://php.net/engine
engine = On

; Détermine si PHP reconnaît ou non le code entre les balises <? et ?> comme du source PHP.
; Il est généralement recommandé d'utiliser <?php et ?> et de désactiver cette option,
; car l'activer peut poser problème lors de la génération de documents XML.
; Note : cette directive ne contrôle pas la balise courte <?=, toujours utilisable.
short_open_tag = Off

; Nombre de chiffres significatifs affichés pour les nombres à virgule flottante.
precision = 14

; La mise en mémoire tampon de sortie (Output Buffering) permet de contrôler la quantité de données
; (hors en-têtes et cookies) que PHP conserve en interne avant de les envoyer au client.
; Si la sortie dépasse ce réglage, PHP envoie les données par blocs.
; Activer ce réglage peut permettre d'envoyer des en-têtes après un print ou echo.
; Sur les serveurs de production, 4096 octets est un bon réglage pour la performance.
output_buffering = 4096

; Vous pouvez rediriger toute la sortie de vos scripts vers une fonction (ex: mb_output_handler).
; Définir un gestionnaire de sortie active automatiquement l'output buffering.
;output_handler =

; La fonction de réécriture d'URL réécrit les URL à la volée via le buffer de sortie.
;url_rewriter.tags

; Le réécriveur d'URL ne réécrit pas les URL absolues ni les formulaires par défaut.
;url_rewriter.hosts

; Compression transparente de la sortie via la bibliothèque zlib.
; Valeurs valides : 'off', 'on', ou une taille de buffer spécifique (défaut 4KB).
zlib.output_compression = Off

; Flush implicite : force PHP à vider le buffer automatiquement après chaque bloc de sortie.
; Impact sérieux sur la performance, recommandé uniquement pour le débogage.
implicit_flush = Off

; Fonction de rappel appelée si l'unserializer trouve une classe non définie.
unserialize_callback_func =

; Précision de sérialisation pour les nombres flottants. -1 utilise le mode dtoa 0 (choix auto).
serialize_precision = -1

; open_basedir limite les opérations sur fichiers au répertoire défini et ses sous-dossiers.
;open_basedir =

; Permet de désactiver certaines fonctions pour des raisons de sécurité.
disable_functions = pcntl_alarm,pcntl_fork,pcntl_waitpid,pcntl_wait,pcntl_wifexited,pcntl_wifstopped,pcntl_wifsignaled,pcntl_wifcontinued,pcntl_wexitstatus,pcntl_wtermsig,pcntl_wstopsig,pcntl_signal,pcntl_signal_get_handler,pcntl_signal_dispatch,pcntl_get_last_error,pcntl_strerror,pcntl_sigprocmask,pcntl_sigwaitinfo,pcntl_sigtimedwait,pcntl_exec,pcntl_getpriority,pcntl_setpriority,pcntl_async_signals,

; Permet de désactiver certaines classes pour des raisons de sécurité.
disable_classes =

; Couleurs pour le mode coloration syntaxique.
;highlight.string  = #DD0000

; Si activé, le script se termine même si l'utilisateur interrompt la requête (utile pour les tâches longues).
;ignore_user_abort = On

; Taille du cache realpath utilisé par PHP (à augmenter si beaucoup de fichiers sont ouverts).
;realpath_cache_size = 4096k

; Durée de conservation (en secondes) des informations realpath pour un fichier/répertoire.
;realpath_cache_ttl = 120

; Active ou désactive le collecteur de références circulaires (Garbage Collector).
zend.enable_gc = On

; Permet d'écrire des scripts dans des encodages incompatibles avec le scanner (ex: Shift_JIS).
;zend.multibyte = Off

;;;;;;;;;;;;;;;;;
; Divers        ;
;;;;;;;;;;;;;;;;;

; Décide si PHP peut exposer sa présence sur le serveur (via l'en-tête du serveur web).
expose_php = Off

;;;;;;;;;;;;;;;;;;;;;;;;
; Limites de Ressources;
;;;;;;;;;;;;;;;;;;;;;;;;

; Temps d'exécution maximum de chaque script, en secondes.
max_execution_time = 30

; Temps maximum qu'un script peut passer à analyser les données d'entrée (POST/GET).
max_input_time = 60

; Nombre maximum de variables d'entrée acceptées (GET/POST/COOKIE).
max_input_vars = 5000

; Quantité maximale de mémoire qu'un script peut consommer.
memory_limit = 128M

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Gestion des erreurs et logs    ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Définit quels types d'erreurs, avertissements et notices PHP doit signaler.
; error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT (Réglage recommandé pour la production)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Détermine si les erreurs doivent être affichées à l'écran ou non.
; TRÈS DANGEREUX en production (fuite d'infos sensibles).
display_errors = Off

; Détermine si les erreurs survenant lors du démarrage de PHP doivent être affichées.
display_startup_errors = Off

; Enregistre les erreurs dans un fichier de log ou via syslog.
log_errors = On

; Longueur maximale des messages d'erreur enregistrés.
log_errors_max_len = 1024

; Ne pas enregistrer les messages répétés survenant dans le même fichier à la même ligne.
ignore_repeated_errors = Off

; Ignore la source lors de l'ignorance des messages répétés.
ignore_repeated_source = Off

; Si activé, les fuites de mémoire seront affichées (uniquement en compile debug).
report_memleaks = On

; Formate les messages d'erreur en HTML pour une lecture facilitée.
html_errors = On

;;;;;;;;;;;;;;;;;;;;;;;;;
; Manipulation de Données ;
;;;;;;;;;;;;;;;;;;;;;;;;;

; Détermine quelles variables super-globales sont enregistrées au démarrage (GET, POST, COOKIE, ENV, SERVER).
variables_order = "GPCS"

; Détermine quelles données sont enregistrées dans le tableau super-global $_REQUEST.
request_order = "GP"

; Détermine si PHP enregistre $argv et $argc (arguments passés en ligne de commande).
register_argc_argv = Off

; Création des variables ENV, REQUEST et SERVER au moment de leur utilisation (performance).
auto_globals_jit = On

; Taille maximale des données POST acceptées par PHP.
post_max_size = 8M

; Type de média par défaut (Content-Type).
default_mimetype = "text/html"

; Jeu de caractères par défaut.
default_charset = "UTF-8"

;;;;;;;;;;;;;;;;;;;;;;;;;;
; Chemins et Répertoires ;
;;;;;;;;;;;;;;;;;;;;;;;;;;

; Répertoire racine des pages PHP.
doc_root =

; Répertoire pour les extensions chargeables (modules).
; extension_dir = "./"

; Répertoire où placer les fichiers temporaires.
sys_temp_dir = "/home/container/tmp"

; Active ou non la fonction dl() (chargement dynamique d'extensions).
enable_dl = Off

; cgi.fix_pathinfo fournit un support réel pour PATH_INFO/PATH_TRANSLATED pour CGI.
;cgi.fix_pathinfo=1