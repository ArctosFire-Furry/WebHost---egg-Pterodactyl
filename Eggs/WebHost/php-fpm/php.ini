[PHP]

;;;;;;;;;;;;;;;;;;;;;;
; À propos de php.ini ;
;;;;;;;;;;;;;;;;;;;;;;
; Configuration optimisée pour FurCode WebHost par ArctosFire.
; Basé sur le profil production avec durcissement Cybersécurité.

engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
unserialize_callback_func =
serialize_precision = -1

; SÉCURITÉ : Restriction des fonctions sensibles pour prévenir les WebShells
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source,pcntl_alarm,pcntl_fork,pcntl_waitpid,pcntl_wait,pcntl_wifexited,pcntl_wifstopped,pcntl_wifsignaled,pcntl_wifcontinued,pcntl_wexitstatus,pcntl_wtermsig,pcntl_wstopsig,pcntl_signal,pcntl_signal_get_handler,pcntl_signal_dispatch,pcntl_get_last_error,pcntl_strerror,pcntl_sigprocmask,pcntl_sigwaitinfo,pcntl_sigtimedwait,pcntl_exec,pcntl_getpriority,pcntl_setpriority,pcntl_async_signals

disable_classes =
zend.enable_gc = On

;;;;;;;;;;;;;;;;;
; Divers        ;
;;;;;;;;;;;;;;;;;

; SÉCURITÉ : Ne pas exposer la présence de PHP dans les headers
expose_php = Off

;;;;;;;;;;;;;;;;;;;;;;;;
; Limites de Ressources;
;;;;;;;;;;;;;;;;;;;;;;;;

; Optimisé pour éviter les timeouts sur les scripts de développement
max_execution_time = 60
max_input_time = 60
max_input_vars = 5000
memory_limit = 256M

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Gestion des erreurs et logs    ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
html_errors = On

;;;;;;;;;;;;;;;;;;;;;;;;;
; Manipulation de Données ;
;;;;;;;;;;;;;;;;;;;;;;;;;

variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On

; SÉCURITÉ & RESSOURCES : Augmentation pour permettre l'upload de fichiers modérés
post_max_size = 32M
upload_max_filesize = 32M

default_mimetype = "text/html"
default_charset = "UTF-8"

;;;;;;;;;;;;;;;;;;;;;;;;;;
; Chemins et Répertoires ;
;;;;;;;;;;;;;;;;;;;;;;;;;;

doc_root =
sys_temp_dir = "/home/container/tmp"
enable_dl = Off
cgi.fix_pathinfo=0

;;;;;;;;;;;;;;;;;;;;;;;;;;
; Sessions               ;
;;;;;;;;;;;;;;;;;;;;;;;;;;

; SÉCURITÉ : Protection contre le vol de session (Session Hijacking)
session.use_strict_mode = On
session.cookie_httponly = On
session.use_only_cookies = On
session.cookie_samesite = "Lax"
session.gc_maxlifetime = 1440